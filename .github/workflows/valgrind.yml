name: Valgrind

# Valgrind memcheck lite soak on every PR/push — 60s memcheck soak of the debug
# nginx + module build. The full memcheck + helgrind soak (600s each) lives in
# ci-deep.yml (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: valgrind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck-lite:
    name: Memcheck lite (60s soak)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev libssl-dev zlib1g-dev \
            libhiredis-dev valgrind

      - name: Build debug nginx + module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Memcheck soak (60s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" 60 4
