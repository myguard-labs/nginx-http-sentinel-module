name: CI Fast

# Fast dynamic analysis on every PR/push — kept short so PR feedback stays
# quick. build-test.yml already does the full build + ASan/UBSan runtime/.t
# matrix; THIS file adds only the two cheap dynamic gates:
#   fuzz-regression : 120s per target on the sentinel input parsers
#                     (feed / botua / ja4h_canon)
#   memcheck-lite   : 60s valgrind memcheck soak (helgrind is deep-only)
# Long discovery (hours fuzz, full memcheck+helgrind soak, scanners) lives in
# ci-deep.yml (monthly cron + workflow_dispatch).
#
# The fuzz targets stub nginx types but fuzz/build.sh guards on an nginx source
# tree under .build/, so we populate it via tools/ci-build.sh (module mode)
# BEFORE building the fuzz binaries.
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s/target)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 30
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev libssl-dev zlib1g-dev \
            libhiredis-dev

      - name: Fetch + configure nginx source (fuzz build needs headers)
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" module

      - name: Build fuzz targets
        run: bash fuzz/build.sh

      - name: Run each target 120s
        run: |
          set -euo pipefail
          cd fuzz
          for t in fuzz_feed fuzz_botua fuzz_ja4h_canon; do
            echo "=== $t (120s) ==="
            dict=""
            [ "$t" != "fuzz_feed" ] && dict="-dict=fuzz.dict"
            set +e
            # shellcheck disable=SC2086
            "./$t" \
              -max_total_time=120 \
              $dict \
              -print_final_stats=1 \
              -artifact_prefix="crash-${t}-" \
              "corpus/$t"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $t crash (exit $rc)"; exit 1; }
            echo "✓ $t: no crashes in 120s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14

  memcheck-lite:
    name: Memcheck lite (60s soak)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang curl libpcre2-dev libssl-dev zlib1g-dev \
            libhiredis-dev valgrind

      - name: Build debug nginx + module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Memcheck soak (60s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          bash tools/soak.sh \
            "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" 60 4
