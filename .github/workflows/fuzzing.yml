name: Fuzzing

# Coverage-guided fuzzing of sentinel input parsers.
# Monthly discovery run + manual dispatch only — not on every PR.

on:
  schedule:
    # Monthly, 1st @ 03:41 UTC.
    - cron: "41 3 1 * *"
  workflow_dispatch:
    inputs:
      duration:
        description: "Fuzz duration in seconds"
        required: false
        default: "900"

concurrency:
  group: fuzz-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Sentinel input fuzz
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libssl-dev

      - name: Select fuzz duration
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "FUZZ_SECS=${{ github.event.inputs.duration }}" >> "$GITHUB_ENV"
          else
            echo "FUZZ_SECS=900" >> "$GITHUB_ENV"
          fi

      - name: Build fuzz targets
        run: bash fuzz/build.sh

      - name: Fuzz feed parser (CrowdSec, highest risk)
        run: |
          fuzz/bin/fuzz_feed \
            -max_total_time="${FUZZ_SECS}" \
            -artifact_prefix="${GITHUB_WORKSPACE}/fuzz/crash-feed-" \
            fuzz/corpus/fuzz_feed

      - name: Fuzz bot-UA scanner
        run: |
          fuzz/bin/fuzz_botua \
            -max_total_time="${FUZZ_SECS}" \
            -artifact_prefix="${GITHUB_WORKSPACE}/fuzz/crash-botua-" \
            fuzz/corpus/fuzz_botua

      - name: Fuzz JA4H canonical-string builder
        run: |
          fuzz/bin/fuzz_ja4h_canon \
            -max_total_time="${FUZZ_SECS}" \
            -artifact_prefix="${GITHUB_WORKSPACE}/fuzz/crash-ja4h-" \
            fuzz/corpus/fuzz_ja4h

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-crashes
          path: |
            ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30
