name: Security Scanners

# flawfinder, clang-tidy, semgrep. Monthly + manual dispatch.

on:
  schedule:
    # Monthly, 1st @ 04:17 UTC.
    - cron: "17 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secure:
    name: Secure
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-secure-${{ runner.os }}-flawfinder-clang-tidy-nginx-dev
          restore-keys: apt-secure-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder \
            clang-tidy \
            python3 \
            python3-pip \
            nginx-dev

      - name: Cache pip packages (semgrep)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}

      - name: Install semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep --version

      - name: Cache semgrep rules
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.semgrep
          key: semgrep-rules-${{ runner.os }}-p-c-security-audit

      - name: Cache nginx-dev generated headers
        id: nginx-dev-objs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/share/nginx/src/objs
          key: nginx-dev-objs-${{ runner.os }}-${{ hashFiles('/var/lib/dpkg/info/nginx-dev.list') }}

      - name: Generate nginx build headers (for clang-tidy)
        if: steps.nginx-dev-objs.outputs.cache-hit != 'true'
        run: |
          cd /usr/share/nginx/src
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null 2>&1 || true

      - name: flawfinder (security risk scanner, SARIF)
        run: |
          flawfinder --minlevel=1 --sarif \
            "$GITHUB_WORKSPACE/src/" \
            > flawfinder.sarif 2>/dev/null || true
          flawfinder --minlevel=1 \
            "$GITHUB_WORKSPACE/src/" \
            2>&1 | tee flawfinder.log
          if flawfinder --minlevel=4 --quiet \
               "$GITHUB_WORKSPACE/src/" \
               2>/dev/null | grep -Eq 'Hits = [1-9]'; then
            echo "flawfinder: high-severity (>=4) findings present" >&2
            exit 1
          fi
          echo "flawfinder: Scan complete"

      - name: Upload flawfinder SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: flawfinder.sarif
          category: flawfinder
        continue-on-error: true

      - name: clang-tidy (cert-*, bugprone-*, clang-analyzer-security.*)
        run: |
          NGINX_OBJS=/usr/share/nginx/src/objs
          NGINX_INCLUDES=$(dpkg -L nginx-dev 2>/dev/null | grep 'ngx_config.h' | head -1 | xargs dirname || echo /usr/include/nginx)
          INCLUDES="-I$NGINX_INCLUDES -I$NGINX_OBJS -I$GITHUB_WORKSPACE/src -I/usr/include"
          for src in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: $(basename "$src") ---"
            # shellcheck disable=SC2086
            clang-tidy "$src" \
              --checks='cert-*,clang-analyzer-security.*,clang-analyzer-unix.*,bugprone-*' \
              --warnings-as-errors='' \
              -- $INCLUDES \
              2>&1 | tee -a clang-tidy.log || true
          done
          echo "clang-tidy: Scan complete"

      - name: semgrep (C rule set)
        run: |
          semgrep scan \
            --config "p/c" \
            --config "p/security-audit" \
            --sarif --output semgrep.sarif \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log || true
          echo "semgrep: Scan complete"

      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/flawfinder.sarif
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
            ${{ github.workspace }}/semgrep.sarif
          retention-days: 14
