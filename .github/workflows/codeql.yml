name: CodeQL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  # dev intentionally excluded: dev uses LOCAL CI only. Remote CodeQL runs
  # only on master (promotion) + manual dispatch.
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev zlib1g-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: c-cpp
          queries: security-extended
          config: |
            paths:
              - src/
            paths-ignore:
              - .build/**

      - name: Cache source tarball
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build/nginx-${{ env.NGINX_VERSION }}.tar.gz
          key: src-nginx-${{ env.NGINX_VERSION }}

      - name: Build traced source
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" module

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:c-cpp
          # This is a PRIVATE repo without GitHub Advanced Security, so the
          # code-scanning SARIF API returns 403 "Resource not accessible by
          # integration" and the job fails on upload even though the analysis
          # itself is clean. Run the queries but write SARIF to disk instead of
          # uploading; the job still fails if a query reports a problem.
          # To restore the Security-tab dashboard, enable GHAS/code scanning in
          # repo settings and flip this back to the default (upload: always).
          upload: never
          output: sarif-results
          upload-database: false

      - name: Fail on CodeQL findings
        run: |
          # We skip SARIF upload (private repo, no GHAS), so reinstate a gate:
          # fail if any .sarif under sarif-results/ contains a result.
          shopt -s nullglob
          total=0
          for f in sarif-results/*.sarif; do
            n=$(python3 -c 'import json,sys; d=json.load(open(sys.argv[1])); print(sum(len(r.get("results",[])) for r in d.get("runs",[])))' "$f")
            echo "  $f: $n result(s)"
            total=$((total + n))
          done
          echo "CodeQL total findings: $total"
          if [ "$total" -gt 0 ]; then
            echo "::error::CodeQL reported $total finding(s) — see logs above"
            exit 1
          fi
